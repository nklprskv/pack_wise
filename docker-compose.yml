services:
  db:
    image: postgres:17
    container_name: pack-wise-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pack-wise-backend
    environment:
      PORT: ${BACKEND_PORT}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgres://packwise:packwise@db:5432/pack_wise?sslmode=disable}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://localhost:80,http://localhost}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pack-wise-frontend
    environment:
      API_URL: ${API_URL:-http://backend:8080}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT}:5173"

volumes:
  postgres_data:
